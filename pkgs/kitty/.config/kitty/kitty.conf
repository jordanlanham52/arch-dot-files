# =============================================================================
#  SHEOL // kitty.conf
#  Opaque background — window-level transparency is handled by Hyprland's
#  active_opacity / inactive_opacity decoration settings.
# =============================================================================

# ---- Shell integration ------------------------------------------------------
# DISABLED: kitty's shell integration injects sourcing of /etc/zsh/zshenv and
# /etc/zsh/zshrc, which on fresh Arch installs may be missing or empty —
# causing zsh to exit immediately and kitty to close. Disable until those
# files exist, or just leave disabled (the integration features are nice but
# not essential).
shell_integration disabled

# ---- Font -------------------------------------------------------------------
font_family       JetBrainsMono Nerd Font
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         12.0
disable_ligatures always

# ---- Window -----------------------------------------------------------------
window_padding_width 18
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size no
initial_window_width 1000
initial_window_height 600

# ---- Transparency (Hyprland-driven) -----------------------------------------
background_opacity 1.0
background_blur 0
dynamic_background_opacity yes

# ---- Cursor -----------------------------------------------------------------
cursor_shape beam
cursor_blink_interval 0
cursor #e8c870

# ---- URL --------------------------------------------------------------------
url_color #a08240
url_style curly

# ---- Bell -------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# ---- Mouse ------------------------------------------------------------------
mouse_hide_wait 3.0

# ---- Keybinds ---------------------------------------------------------------
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard
map ctrl+shift+plus  change_font_size all +1
map ctrl+shift+minus change_font_size all -1
map ctrl+shift+0     change_font_size all 0

# ---- Sheol palette (no cool tones, only golds/grays) -----------------------
foreground            #b8aea0
background            #050507
selection_foreground  #d4c8b0
selection_background  #2a2530

color0  #14111a
color8  #2a2530
color1  #5a1a1a
color9  #7a2a2a
color2  #6b5530
color10 #8a7040
color3  #a08240
color11 #c9a651
color4  #6b6470
color12 #8a8088
color5  #4a3a1f
color13 #6b5530
color6  #c9a651
color14 #e8c870
color7  #b8aea0
color15 #d4c8b0
