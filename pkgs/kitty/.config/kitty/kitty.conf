# =============================================================================
#  SHEOL // kitty.conf
#  Opaque background — window-level transparency is handled by Hyprland's
#  active_opacity / inactive_opacity decoration settings.
# =============================================================================

# ---- Font -------------------------------------------------------------------
# Use generic family names with fallbacks. Kitty falls back to the next font
# if one is missing, rather than refusing to start.
font_family       JetBrainsMono Nerd Font
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         12.0
disable_ligatures always

# ---- Shell (explicit) -------------------------------------------------------
# Force kitty to use zsh as login shell. If left as 'shell .' kitty uses $SHELL,
# which on a fresh install may not yet be zsh and could fail.
shell zsh -l

# ---- Display server (force XWayland to avoid Wayland icon-support crash) ----
# Kitty 0.40+ on certain Hyprland versions crashes with:
#   [glfw error 65548]: Wayland: The compositor does not support changing window icons
# Forcing XWayland sidesteps this entirely. Comment out if your hardware/setup
# handles native Wayland kitty fine.
linux_display_server x11

# ---- Window -----------------------------------------------------------------
window_padding_width 18
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size no
initial_window_width 1000
initial_window_height 600

# ---- Transparency (Hyprland-driven) -----------------------------------------
background_opacity 1.0
background_blur 0
dynamic_background_opacity yes

# ---- Cursor -----------------------------------------------------------------
cursor_shape beam
cursor_blink_interval 0
cursor #e8c870

# ---- URL --------------------------------------------------------------------
url_color #a08240
url_style curly

# ---- Tabs (simple style — powerline can crash if Nerd Font glyphs missing) -
tab_bar_edge top
tab_bar_style separator
tab_separator " | "
active_tab_foreground   #e8c870
active_tab_background   #14111a
inactive_tab_foreground #6b6470
inactive_tab_background #050507

# ---- Bell -------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# ---- Mouse ------------------------------------------------------------------
mouse_hide_wait 3.0

# ---- Keybinds ---------------------------------------------------------------
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard
map ctrl+shift+plus  change_font_size all +1
map ctrl+shift+minus change_font_size all -1
map ctrl+shift+0     change_font_size all 0

# ---- Sheol palette (no cool tones, only golds/grays) -----------------------
foreground            #b8aea0
background            #050507
selection_foreground  #d4c8b0
selection_background  #2a2530

color0  #14111a
color8  #2a2530
color1  #5a1a1a
color9  #7a2a2a
color2  #6b5530
color10 #8a7040
color3  #a08240
color11 #c9a651
color4  #6b6470
color12 #8a8088
color5  #4a3a1f
color13 #6b5530
color6  #c9a651
color14 #e8c870
color7  #b8aea0
color15 #d4c8b0
