# =============================================================================
#  SHEOL // foot.ini
#  Pure-Wayland terminal. Sheol palette, no cool tones.
# =============================================================================

font=JetBrainsMono Nerd Font:size=11
pad=18x14
dpi-aware=yes

[main]
# Open a window even if the shell exits immediately
# (foot terminates by default — uncomment to keep visible)
# initial-window-size-pixels=1000x600

[mouse]
hide-when-typing=yes

[colors]
foreground=b8aea0
background=050507
selection-foreground=d4c8b0
selection-background=2a2530

# 16 ANSI — sheol palette, gold/gray only
regular0=14111a
regular1=5a1a1a
regular2=6b5530
regular3=a08240
regular4=6b6470
regular5=4a3a1f
regular6=c9a651
regular7=b8aea0

bright0=2a2530
bright1=7a2a2a
bright2=8a7040
bright3=c9a651
bright4=8a8088
bright5=6b5530
bright6=e8c870
bright7=d4c8b0

[cursor]
style=beam
color=050507 e8c870

[url]
launch=xdg-open ${url}

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+Shift+plus
font-decrease=Control+Shift+minus
font-reset=Control+Shift+0
