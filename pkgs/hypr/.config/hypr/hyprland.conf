# =============================================================================
#  SHEOL // hyprland.conf
#  Calibrated to the Tarnished Reliquary mockups.
#  Tested on Hyprland 0.54.x and 0.55.x.
# =============================================================================

source = ~/.config/hypr/colors.conf

# ---- Monitors ----------------------------------------------------------------
# Edit for your hardware. `hyprctl monitors all` lists what's available.
monitor = , preferred, auto, 1

# ---- Programs ----------------------------------------------------------------
$terminal     = kitty
$fileManager  = kitty -e yazi
$menu         = rofi -show drun -theme ~/.config/rofi/missal.rasi
$browser      = firefox
$lock         = hyprlock

# ---- Autostart ---------------------------------------------------------------
exec-once = awww-daemon
# Wait for awww-daemon socket, then load wallpaper (more reliable than fixed sleep)
exec-once = bash -c 'for i in {1..20}; do awww query >/dev/null 2>&1 && break; sleep 0.25; done; awww img ~/.config/hypr/wallpaper.png --transition-type none 2>&1 | tee -a /tmp/awww-load.log'
exec-once = waybar -c ~/.config/waybar/top.jsonc -s ~/.config/waybar/style.css
exec-once = swaync
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --watch cliphist store

# ---- Environment -------------------------------------------------------------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# ---- Input -------------------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# Touchpad gesture (Hyprland 0.54+ moved this out of a block)
gesture = 3, horizontal, workspace

# ---- General -----------------------------------------------------------------
general {
    border_size = 2
    gaps_in = 8
    gaps_out = 16
    gaps_workspaces = 40

    # Active border: four-stage gold staircase, 45° sweep
    col.active_border = $tarnishA $gildA $haloA $gildA $tarnishA 45deg
    col.inactive_border = rgba(2a2530ff)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ---- Decoration --------------------------------------------------------------
decoration {
    rounding = 0                    # NEVER rounded. Deco is sharp.
    active_opacity = 0.85
    inactive_opacity = 0.75

    dim_inactive = true
    dim_strength = 0.18
    dim_special = 0.4

    # Blur disabled — wallpaper shows sharp through translucent windows.
    # Enable if you want frosted glass; tune size/passes/brightness/contrast.
    blur {
        enabled = false
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.0
        noise = 0.02
    }

    shadow {
        enabled = true
        range = 30
        render_power = 4
        color = $shadowA
        color_inactive = $cryptA
        offset = 0 4
    }
}

# ---- Animations — mechanical, processional, no bounce ------------------------
animations {
    enabled = yes

    bezier = censer,    0.4, 0.0, 0.2, 1.0
    bezier = liturgy,   0.7, 0.0, 0.3, 1.0
    bezier = veil,      0.6, 0.0, 0.4, 1.0
    bezier = mechanism, 0.25, 0.0, 0.0, 1.0

    animation = windows,         1, 6,  censer,    slide
    animation = windowsIn,       1, 6,  censer,    slide
    animation = windowsOut,      1, 5,  mechanism, slide
    animation = windowsMove,     1, 5,  liturgy
    animation = workspaces,      1, 7,  liturgy,   slidevert
    animation = specialWorkspace, 1, 6, censer,    slidevert
    animation = fade,            1, 5,  veil
    animation = fadeIn,          1, 5,  veil
    animation = fadeOut,         1, 4,  veil
    animation = border,          1, 12, liturgy
    animation = borderangle,     1, 200, liturgy, loop
    animation = layers,          1, 5,  veil, slide
}

# ---- Layout ------------------------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    background_color = $abyss
}

# =============================================================================
#  Window rules — Hyprland 0.54+ syntax
#  Form: windowrule = match:<prop> <regex>, <effect> [value]
# =============================================================================

# Float utility/dialog/auth windows
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(qt5ct|qt6ct)$, float on
windowrule = match:class ^(file_progress)$, float on
windowrule = match:class ^(confirm)$, float on
windowrule = match:class ^(dialog)$, float on
windowrule = match:class ^(download)$, float on
windowrule = match:class ^(notification)$, float on
windowrule = match:class ^(error)$, float on
windowrule = match:class ^(splash)$, float on
windowrule = match:class ^(confirmreset)$, float on
windowrule = match:title ^(Open File)(.*)$, float on
windowrule = match:title ^(Select a File)(.*)$, float on
windowrule = match:title ^(Choose wallpaper)(.*)$, float on
windowrule = match:title ^(Open Folder)(.*)$, float on
windowrule = match:title ^(Save As)(.*)$, float on

# Sized floats
windowrule = match:class ^(pavucontrol)$, size 800 600
windowrule = match:class ^(nwg-look)$, size 900 700

# Special workspace — Joker scratchpad
windowrule = match:class ^(scratch)$, workspace special silent

# Picture-in-picture
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 480 270

# Idle inhibit on fullscreen
windowrule = match:class .*, idle_inhibit fullscreen

# No blur for browsers (kept for when blur is re-enabled)
windowrule = match:class ^(firefox)$, no_blur on
windowrule = match:class ^(chromium)$, no_blur on

# Per-app opacity overrides — opaque for content-heavy apps
windowrule = match:class ^(firefox)$, opacity 1.0 1.0
windowrule = match:class ^(chromium)$, opacity 1.0 1.0
windowrule = match:class ^(code)$, opacity 1.0 1.0

# Layer rules — namespace match + effect, with explicit values
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 1, match:namespace rofi
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 1, match:namespace waybar
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 1, match:namespace swaync-control-center
layerrule = ignore_alpha 1, match:namespace swaync-notification-window

# ---- Workspaces — the suits --------------------------------------------------
# I ♠ Spades II ♣ Clubs III ♥ Hearts IV ♦ Diamonds V — overflow
workspace = 1, monitor:, default:true, persistent:true
workspace = 2, monitor:, persistent:true
workspace = 3, monitor:, persistent:true
workspace = 4, monitor:, persistent:true
workspace = 5, monitor:, persistent:true
workspace = special:joker, on-created-empty:[float] $terminal

# =============================================================================
#  Keybinds
# =============================================================================
$mod = SUPER

# Core
bind = $mod, Return,    exec, $terminal
bind = $mod, Q,         killactive,
bind = $mod SHIFT, E,   exit,
bind = $mod, E,         exec, $fileManager
bind = $mod, V,         togglefloating,
bind = $mod, R,         exec, $menu
bind = $mod, P,         pseudo,
bind = $mod, T,         togglesplit,
bind = $mod, F,         fullscreen, 0
bind = $mod SHIFT, F,   fullscreen, 1
bind = $mod CTRL, L,    exec, $lock
bind = $mod, L,         exec, $lock
bind = $mod, M,         exec, wlogout
bind = $mod, B,         exec, $browser
bind = $mod, N,         exec, swaync-client -t -sw
bind = $mod, C,         exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/missal.rasi | cliphist decode | wl-copy

# Window focus
bind = $mod, left,      movefocus, l
bind = $mod, right,     movefocus, r
bind = $mod, up,        movefocus, u
bind = $mod, down,      movefocus, d
bind = $mod, H,         movefocus, l
bind = $mod, K,         movefocus, u
bind = $mod, J,         movefocus, d

# Window movement
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Resize
binde = $mod CTRL, left,  resizeactive, -40 0
binde = $mod CTRL, right, resizeactive, 40 0
binde = $mod CTRL, up,    resizeactive, 0 -40
binde = $mod CTRL, down,  resizeactive, 0 40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod, period,     workspace, e+1
bind = $mod, comma,      workspace, e-1

# Joker scratchpad
bind = $mod, S,           togglespecialworkspace, joker
bind = $mod SHIFT, S,     movetoworkspace, special:joker

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = , Print,          exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = SHIFT, Print,     exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = CTRL, Print,      exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = $mod SHIFT, C,    exec, hyprpicker -a

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Resize submap
bind = $mod, X, submap, resize
submap = resize
binde = , left,  resizeactive, -30 0
binde = , right, resizeactive, 30 0
binde = , up,    resizeactive, 0 -30
binde = , down,  resizeactive, 0 30
bind  = , escape, submap, reset
bind  = , Return, submap, reset
submap = reset
