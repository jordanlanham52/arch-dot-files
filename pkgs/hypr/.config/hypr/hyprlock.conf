# =============================================================================
#  SHEOL // hyprlock.conf  v2
#  The rite of return. Calibrated to the lockscreen mockup.
#
#  Stepped corners are composed from overlapping rectangles since hyprlock's
#  shape widget has no native ziggurat geometry. Frame is inset 80px from
#  screen edges to match the mockup's breathing room.
#
#  Sizes are tuned for 1920x1080. See bottom of file for scaling guidance.
# =============================================================================

source = ~/.config/hypr/colors.conf

$font_display = Cinzel Decorative
$font_body    = Cormorant Garamond
$font_mono    = JetBrainsMono Nerd Font

$roman = ~/.config/hypr/scripts/roman_clock.py

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    immediate_render = true
}

# ---- Background --------------------------------------------------------------
# Wallpaper, blurred and dimmed — atmospheric backdrop only.
# Falls back to the abyss color if wallpaper.png is missing.
background {
    monitor =
    path    = ~/.config/hypr/wallpaper.png
    color   = rgba(050507ff)
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 1.0
    brightness = 0.55
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# =============================================================================
#  THE FRAME — concentric inset rectangles
#  Outer at 80px from screen edges; inner band 14px inside; detail line 7px in
# =============================================================================

# Outer hairline gilt rectangle
shape {
    monitor =
    size = 1760, 920
    color = rgba(00000000)
    border_size = 1
    border_color = $gildA
    rounding = 0
    position = 0, 0
    halign = center
    valign = center
}

# Inner thicker tarnish band
shape {
    monitor =
    size = 1730, 890
    color = rgba(00000000)
    border_size = 4
    border_color = $tarnishA
    rounding = 0
    position = 0, 0
    halign = center
    valign = center
}

# Innermost detail hairline
shape {
    monitor =
    size = 1716, 876
    color = rgba(00000000)
    border_size = 1
    border_color = $gildA
    rounding = 0
    position = 0, 0
    halign = center
    valign = center
}

# =============================================================================
#  STEPPED CORNER ACCENTS
#  Small filled gilt rectangles at each corner of the outer frame, positioned
#  to suggest ziggurat steps. Two L-shaped step accents per corner.
#  Anchor point: outer rectangle is 1760w x 920h, so corners are at (±880, ±460)
# =============================================================================

# ---- Top-left -------------------------------------------------
shape {
    monitor =
    size = 30, 2
    color = $gildA
    rounding = 0
    border_size = 0
    position = -865, 458
    halign = center
    valign = center
}
shape {
    monitor =
    size = 2, 30
    color = $gildA
    rounding = 0
    border_size = 0
    position = -851, 444
    halign = center
    valign = center
}

# ---- Top-right ------------------------------------------------
shape {
    monitor =
    size = 30, 2
    color = $gildA
    rounding = 0
    border_size = 0
    position = 865, 458
    halign = center
    valign = center
}
shape {
    monitor =
    size = 2, 30
    color = $gildA
    rounding = 0
    border_size = 0
    position = 851, 444
    halign = center
    valign = center
}

# ---- Bottom-left ----------------------------------------------
shape {
    monitor =
    size = 30, 2
    color = $gildA
    rounding = 0
    border_size = 0
    position = -865, -458
    halign = center
    valign = center
}
shape {
    monitor =
    size = 2, 30
    color = $gildA
    rounding = 0
    border_size = 0
    position = -851, -444
    halign = center
    valign = center
}

# ---- Bottom-right ---------------------------------------------
shape {
    monitor =
    size = 30, 2
    color = $gildA
    rounding = 0
    border_size = 0
    position = 865, -458
    halign = center
    valign = center
}
shape {
    monitor =
    size = 2, 30
    color = $gildA
    rounding = 0
    border_size = 0
    position = 851, -444
    halign = center
    valign = center
}

# =============================================================================
#  CENTERPIECE — top to bottom, anchored from screen center
# =============================================================================

# ---- Spade pip (image) ------------------------------------------------------
# Comment this block out if you don't have spade.png yet.
image {
    monitor =
    path = ~/.config/hypr/spade.png
    size = 360
    border_size = 0
    rounding = 0
    rotate = 0
    position = 0, 200
    halign = center
    valign = center
}

# ---- Glyph fallback (only shows if image fails to load) ---------------------
# Some installs without spade.png will benefit from this — uncomment if needed.
# label {
#     monitor =
#     text = ♠
#     color = $haloA
#     font_size = 140
#     font_family = $font_display
#     position = 0, 200
#     halign = center
#     valign = center
# }

# ---- Top divider ⊹⸻⸻⊹ ----------------------------------------------------
label {
    monitor =
    text = ⊹  ⸻⸺⸻⸺⸻⸺⸻⸺⸻  ⊹
    color = $gildA
    font_size = 16
    font_family = $font_body
    position = 0, 40
    halign = center
    valign = center
}

# ---- Time --------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] $roman --time
    color = $relic
    font_size = 84
    font_family = $font_display
    position = 0, -50
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(a0824055)
}

# ---- Date --------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:60000] $roman --date
    color = $linen
    font_size = 14
    font_family = $font_body
    position = 0, -130
    halign = center
    valign = center
}

# ---- Bottom divider ---------------------------------------------------------
label {
    monitor =
    text = ⊹  ⸻⸺⸻⸺⸻⸺⸻⸺⸻  ⊹
    color = $gildA
    font_size = 16
    font_family = $font_body
    position = 0, -170
    halign = center
    valign = center
}

# ---- Password input ---------------------------------------------------------
input-field {
    monitor =
    size = 380, 48
    outline_thickness = 1
    dots_size = 0.20
    dots_spacing = 0.45
    dots_center = true
    dots_rounding = 0
    outer_color = $gildA
    inner_color = $cryptA
    font_color = $relic
    fade_on_empty = false
    placeholder_text = <i>enter the rite</i>
    hide_input = false
    rounding = 0
    check_color = $halo
    fail_color = $sanctus
    fail_text = <i>denied</i>
    fail_transition = 300
    capslock_color = $leaf
    numlock_color = $leaf
    bothlock_color = $leaf
    invert_numlock = false
    swap_font_color = false
    position = 0, -240
    halign = center
    valign = center
}

# ---- Nameplate --------------------------------------------------------------
label {
    monitor =
    text = ◆  IORDANUS  LANHAM  ◆
    color = $linen
    font_size = 14
    font_family = $font_body
    position = 0, -320
    halign = center
    valign = center
}

# ---- Bottom motto -----------------------------------------------------------
label {
    monitor =
    text = <i>memento ludere</i>
    color = $tarnishA
    font_size = 11
    font_family = $font_body
    position = 0, 50
    halign = center
    valign = bottom
}

# =============================================================================
#  CALIBRATION NOTES
#
#  Sizes assume 1920x1080. For other resolutions:
#
#  2560x1440:
#    outer:    2400, 1230
#    inner:    2370, 1200
#    detail:   2356, 1186
#    corner anchor x = ±1185, y = ±613
#
#  3840x2160 (4K):
#    outer:    3600, 1840
#    inner:    3570, 1810
#    detail:   3556, 1796
#    corner anchor x = ±1785, y = ±918
#
#  Ultrawide 3440x1440:
#    outer:    3280, 1230
#    inner:    3250, 1200
#    detail:   3236, 1186
#    corner anchor x = ±1625, y = ±613
#
#  Or use percentages (which scale automatically) but lose the precise inset:
#    size = 92%, 85%
# =============================================================================
