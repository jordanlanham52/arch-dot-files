# =============================================================================
#  SHEOL // .tmux.conf
#  Status bar matches the rice. Gold-on-abyss, slim, restraint.
# =============================================================================

# ---- Prefix and basics ------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g focus-events on
set -g escape-time 0
set -g history-limit 10000

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-kitty:Tc"

# ---- Reload config with prefix + r -----------------------------------------
bind r source-file ~/.tmux.conf \; display "  ♠  reloaded"

# ---- Splits — keep CWD ------------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ---- Vim-style pane nav -----------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Vim mode for copy ------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# =============================================================================
#  THEME — sheol
# =============================================================================

# Status bar position
set -g status-position bottom
set -g status-justify left
set -g status-interval 5

# Base style
set -g status-style "fg=#b8aea0,bg=#050507"
set -g status-left-length 50
set -g status-right-length 80

# Status left: session name in a gold card
set -g status-left "#[fg=#050507,bg=#a08240,bold] ♠ #S #[fg=#a08240,bg=#050507,nobold] "

# Status right: date · time · host
set -g status-right "#[fg=#4a3a1f]#[fg=#6b6470,bg=#050507] %H:%M #[fg=#4a3a1f]│#[fg=#a08240] %d %b #[fg=#4a3a1f]│#[fg=#c9a651] #h "

# Window status
setw -g window-status-style "fg=#6b6470,bg=#050507"
setw -g window-status-format "  #I #W  "

setw -g window-status-current-style "fg=#e8c870,bg=#14111a,bold"
setw -g window-status-current-format "  #I #W  "

setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#1f1a26"
set -g pane-active-border-style "fg=#a08240"

# Message line (when typing :commands)
set -g message-style "fg=#e8c870,bg=#14111a"
set -g message-command-style "fg=#e8c870,bg=#14111a"

# Copy mode highlight
setw -g mode-style "fg=#050507,bg=#a08240,bold"

# Activity / bell
setw -g window-status-bell-style "fg=#5a1a1a,bg=#050507,bold"
setw -g window-status-activity-style "fg=#c9a651,bg=#050507"

# Clock mode (prefix + t)
setw -g clock-mode-colour "#c9a651"
setw -g clock-mode-style 24
