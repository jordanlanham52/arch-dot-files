# =============================================================================
#  SHEOL // kitty.conf — alternative to ghostty
# =============================================================================

# Font
font_family       JetBrainsMono Nerd Font
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         12.0
disable_ligatures always

# Window
window_padding_width 18
hide_window_decorations yes
background_opacity 0.93
background_blur 20
confirm_os_window_close 0

# Cursor
cursor_shape beam
cursor_blink_interval 0
cursor #e8c870

# Selection
selection_foreground #d4c8b0
selection_background #14111a

# URL color
url_color #a08240
url_style single

# Tabs
tab_bar_style separator
tab_separator " ▎ "
active_tab_foreground   #e8c870
active_tab_background   #0c0a10
inactive_tab_foreground #6b6470
inactive_tab_background #050507
tab_bar_background      #050507

# Bell
enable_audio_bell no

# Mouse
mouse_hide_wait 1.0
copy_on_select clipboard

# Scrollback
scrollback_lines 100000

# =============================================================================
#  Color palette
# =============================================================================
foreground            #b8aea0
background            #050507
cursor_text_color     #050507

# Black
color0  #0c0a10
color8  #2a2530

# Red (sanctus)
color1  #5a1a1a
color9  #8b2a2a

# Green (oxide — gold-leaning)
color2  #6b5530
color10 #a08240

# Yellow (gilt → leaf)
color3  #a08240
color11 #c9a651

# Blue (tarnish — gold staircase, NOT actual blue)
color4  #4a3a1f
color12 #6b5530

# Magenta (viaticum)
color5  #2d1a3a
color13 #4a2a5a

# Cyan (linen — muted gray)
color6  #6b6470
color14 #b8aea0

# White (bone → pallor)
color7  #b8aea0
color15 #e8dfd0
